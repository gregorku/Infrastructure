###############################################################################
#
# Infrastructure Project
#
# File:
#   compose/20-crowdsec.yml
#
# Description:
#   CrowdSec Security Engine
#
###############################################################################

services:

  ###########################################################################
  # CrowdSec
  ###########################################################################

  crowdsec:

    image: crowdsecurity/crowdsec:${CROWDSEC_VERSION}

    container_name: crowdsec

    restart: unless-stopped

    init: true

    ###########################################################################
    # Networks
    ###########################################################################

    networks:

      bridge-moje:

        ipv4_address: ${IP_CROWDSEC}

    environment:

      TZ: ${TZ}

    ###########################################################################
    # Volumes
    ###########################################################################

        volumes:

      #
      # Configuration
      #

      - ${STACK_DIR}/configs/crowdsec:/etc/crowdsec:ro

      #
      # Database
      #

      - ${DATA_DIR}/crowdsec/db:/var/lib/crowdsec/db

      #
      # Runtime data
      #

      - ${DATA_DIR}/crowdsec/data:/var/lib/crowdsec/data

      #
      # Traefik access logs
      #

      - ${DATA_DIR}/traefik/logs:/logs:ro

      #
      # Docker socket
      #

      - /var/run/docker.sock:/var/run/docker.sock:ro

    healthcheck:

      test:

        - CMD

        - cscli

        - version

      interval: 30s

      timeout: 10s

      retries: 5

    security_opt:

      - no-new-privileges:true

    labels:

      - "com.centurylinklabs.watchtower.enable=true"